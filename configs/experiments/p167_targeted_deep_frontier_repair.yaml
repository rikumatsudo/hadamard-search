experiment_name: p167_targeted_deep_frontier_repair
description: >
  Targeted deep repair benchmark on selected p167 frontier candidates. This is not a
  generator, filter, classifier, or reranker experiment.

p: 167
tuple_registry: configs/fixtures/p167_tuple_classes.json
frontier_files:
  - configs/fixtures/p167_targeted_deep_frontier_repair_candidates.jsonl
softwall_escape_frontier_files:
  - configs/fixtures/p167_softwall_escape_frontier_candidates.jsonl
tuple_classes:
  - p167_c01
  - p167_c05
  - p167_c09

operators:
  - score_only_1swap_greedy
  - exact_joint_2swap_beam_deep
  - exact_joint_3swap_beam
  - defect_targeted_destroy_repair_deep
  - pair_level_partial_defect_repair_deep
  - restricted_exact_joint_lns_radius3_5
softwall_escape_operators:
  - score_only_1swap_greedy
  - defect_targeted_destroy_repair_deep
  - defect_targeted_softwall_escape_lns
  - closure_shell_softwall_escape_lns
  - pair_level_softwall_escape_lns
  - annealed_exact_joint_radius7_lns

exact_joint_update:
  formula: "Delta n = h*f_tilde + f*h_tilde + h*h_tilde"
  h: "h = 1_B - 1_R for remove set R and add set B"
  note: "Multi-swap operators evaluate the joint update exactly, not as a sum of 1-swap deltas."

remote_smoke:
  shard_count: 1
  max_parallel: 1
  frontier_count: 3
  operators:
    - score_only_1swap_greedy
    - exact_joint_2swap_beam_deep
  max_repair_steps: 1
  pool_size: 8
  eval_cap_per_step: 40
  dmin_sample_count: 20
  max_wall_time_ms: 2000

production_40:
  shard_count: 40
  max_parallel: 40
  frontier_count: 90
  max_repair_steps: 16
  pool_size: 40
  lns_pool_size: 48
  lns_radius: 5
  beam_width: 16
  eval_cap_per_step: 3000
  dmin_sample_count: 320
  max_wall_time_ms: 60000
  base_seed: 168337

softwall_escape_40:
  shard_count: 40
  max_parallel: 40
  frontier_count: 66
  max_repair_steps: 40
  pool_size: 56
  lns_pool_size: 72
  lns_radius: 7
  beam_width: 24
  eval_cap_per_step: 7000
  dmin_sample_count: 640
  max_wall_time_ms: 180000
  base_seed: 168943
  escape_policy:
    bounded_uphill: true
    escape_uphill_margin: 36
    escape_objective_margin: 48
    escape_temperature: 16
    escape_stall_steps: 8
  objective_weights:
    pair_loss_weight: 0.02
    shell_gap_weight: 0.5
    max_abs_weight: 18

score_thresholds: [1000, 800, 600, 500, 400, 300, 240, 200, 180, 160, 120, 100]

artifact_policy:
  upload_raw_logs: false
  summary_only: true

notes:
  - Score0 is only a candidate until Sage validates SDS and HH^T = 668I.
  - c01/c05 are production-like targets; c09 is benchmark/trap control.
