name: p167 focused near-hit diagnostic

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Short label for artifact and Slack messages"
        required: false
        default: "p167-focused-smoke"
        type: string
      candidate_roots:
        description: "Comma-separated candidate files/directories"
        required: false
        default: "configs/fixtures/p167_focused_nearhit_candidates.jsonl"
        type: string
      max_candidates:
        description: "Maximum selected p167 near-hit candidates"
        required: false
        default: "2"
        type: string
      modes:
        description: "Comma-separated diagnostic modes"
        required: false
        default: "baseline_score_only_recheck,focused_high_abs_rho,focused_stubborn_defect,focused_weighted_defect,focused_plus_small_threshold,focused_top_defect_pair,focused_with_exactlike_guard"
        type: string
      steps:
        description: "Focused walk steps per mode/restart"
        required: false
        default: "20"
        type: string
      restarts:
        description: "Restarts per candidate/mode"
        required: false
        default: "1"
        type: string
      sample_swaps:
        description: "Candidate swaps sampled per step"
        required: false
        default: "50"
        type: string
      diagnostic_samples:
        description: "Sampled 1-swap diagnostics per snapshot"
        required: false
        default: "80"
        type: string
      snapshot_accepted:
        description: "Accepted-move snapshot list"
        required: false
        default: "0,25,50,100,150,200,300,500"
        type: string
      shard_count:
        description: "Shard count for production fan-out"
        required: false
        default: "1"
        type: string
      max_parallel:
        description: "Maximum parallel shard jobs"
        required: false
        default: "1"
        type: string
      artifact_retention_days:
        description: "Artifact retention, 1-90 days"
        required: false
        default: "14"
        type: string
  pull_request:
    paths:
      - "sage/69_p167_focused_nearhit_diagnostic.sage"
      - ".github/workflows/p167-focused-nearhit-diagnostic.yml"
      - "configs/fixtures/p167_focused_nearhit_candidates.jsonl"
      - "sage/06_known_sds_regression.sage"

permissions:
  contents: read

concurrency:
  group: p167-focused-nearhit-${{ github.ref }}-${{ inputs.run_label || github.event_name }}
  cancel-in-progress: false

env:
  SAGE_DOCKER_IMAGE: sagemath/sagemath:10.8
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  define-shards:
    name: Define shard matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
      shard_jobs: ${{ steps.matrix.outputs.shard_jobs }}
      fanout: ${{ steps.matrix.outputs.fanout }}
    steps:
      - name: Build matrix
        id: matrix
        env:
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          MAX_PARALLEL: ${{ inputs.max_parallel || '1' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          shard_count = int(os.environ.get("SHARD_COUNT") or "1")
          max_parallel = int(os.environ.get("MAX_PARALLEL") or "1")
          if shard_count < 1:
              raise SystemExit("shard_count must be >= 1")
          if max_parallel < 1:
              raise SystemExit("max_parallel must be >= 1")
          max_parallel = min(max_parallel, shard_count)
          width = max(2, len(str(shard_count - 1)))
          matrix = [
              {
                  "shard_index": idx,
                  "shard_suffix": "single" if shard_count == 1 else f"s{idx:0{width}d}",
              }
              for idx in range(shard_count)
          ]
          print(f"matrix={json.dumps({'include': matrix}, separators=(',', ':'))}")
          print(f"max_parallel={max_parallel}")
          print(f"shard_jobs={shard_count}")
          print(f"fanout={'true' if shard_count > 1 else 'false'}")
          PY

  p167-focused-diagnostic:
    name: Run p167 focused diagnostic (${{ matrix.shard_suffix }})
    needs: define-shards
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.define-shards.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.define-shards.outputs.matrix) }}
    outputs:
      out_dir: ${{ steps.prepare.outputs.out_dir }}
      safe_label: ${{ steps.prepare.outputs.safe_label }}
      retention_days: ${{ steps.prepare.outputs.retention_days }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare run
        id: prepare
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-focused-smoke' }}
          RETENTION_DAYS: ${{ inputs.artifact_retention_days || '14' }}
          SHARD_SUFFIX: ${{ matrix.shard_suffix }}
        run: |
          set -euo pipefail

          if ! [[ "$RETENTION_DAYS" =~ ^[0-9]+$ ]] || [ "$RETENTION_DAYS" -lt 1 ] || [ "$RETENTION_DAYS" -gt 90 ]; then
            echo "::error::artifact_retention_days must be an integer from 1 to 90"
            exit 2
          fi

          raw_label="$RUN_LABEL"
          if [ "$SHARD_SUFFIX" != "single" ]; then
            raw_label="${RUN_LABEL}-${SHARD_SUFFIX}"
          fi

          safe_label="$(printf '%s' "$raw_label" | tr -c 'A-Za-z0-9_.-' '-')"
          safe_label="${safe_label:-p167-focused-smoke}"
          out_dir="outputs/artifacts/${safe_label}-${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"

          {
            echo "safe_label=$safe_label"
            echo "out_dir=$out_dir"
            echo "retention_days=$RETENTION_DAYS"
          } >> "$GITHUB_OUTPUT"

      - name: Run p167 focused near-hit diagnostic
        id: diagnostic
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          CANDIDATE_ROOTS: ${{ inputs.candidate_roots || 'configs/fixtures/p167_focused_nearhit_candidates.jsonl' }}
          MAX_CANDIDATES: ${{ inputs.max_candidates || '2' }}
          MODES: ${{ inputs.modes || 'baseline_score_only_recheck,focused_high_abs_rho,focused_stubborn_defect,focused_weighted_defect,focused_plus_small_threshold,focused_top_defect_pair,focused_with_exactlike_guard' }}
          STEPS: ${{ inputs.steps || '20' }}
          RESTARTS: ${{ inputs.restarts || '1' }}
          SAMPLE_SWAPS: ${{ inputs.sample_swaps || '50' }}
          DIAGNOSTIC_SAMPLES: ${{ inputs.diagnostic_samples || '80' }}
          SNAPSHOT_ACCEPTED: ${{ inputs.snapshot_accepted || '0,25,50,100,150,200,300,500' }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: |
          set -euo pipefail

          args=(
            sage sage/69_p167_focused_nearhit_diagnostic.sage
            --candidate-roots "$CANDIDATE_ROOTS"
            --max-candidates "$MAX_CANDIDATES"
            --modes "$MODES"
            --steps "$STEPS"
            --restarts "$RESTARTS"
            --sample-swaps "$SAMPLE_SWAPS"
            --diagnostic-samples "$DIAGNOSTIC_SAMPLES"
            --snapshot-accepted "$SNAPSHOT_ACCEPTED"
            --shard-index "$SHARD_INDEX"
            --shard-count "$SHARD_COUNT"
            --out-dir "$OUT_DIR"
          )
          sage_command="$(printf '%q ' "${args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee "$OUT_DIR/runner.log"

      - name: Build GitHub summary
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          {
            echo "## p167 focused near-hit diagnostic"
            echo
            if [ -f "$OUT_DIR/p167_focused_nearhit_diagnostic_summary.md" ]; then
              sed -n '1,220p' "$OUT_DIR/p167_focused_nearhit_diagnostic_summary.md"
            else
              echo "Summary was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Slack payload
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          RUN_LABEL: ${{ inputs.run_label || 'p167-focused-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          out_dir = os.environ["OUT_DIR"]
          label = os.environ["RUN_LABEL"]
          status = os.environ["JOB_STATUS"].upper()
          run_url = os.environ["RUN_URL"]
          hypo_path = os.path.join(out_dir, "p167_focused_hypothesis_evaluation.json")
          hypo = {}
          if os.path.exists(hypo_path):
              with open(hypo_path) as f:
                  hypo = json.load(f)
          payload = {
              "text": "p167 focused near-hit diagnostic GitHub Actions run",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*p167 focused near-hit diagnostic* <{run_url}|GitHub Actions run>",
                      },
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Status*\\n{status}"},
                          {"type": "mrkdwn", "text": f"*Label*\\n{label}"},
                          {"type": "mrkdwn", "text": f"*H-P167-FRW1*\\n{hypo.get('H_P167_FRW1', {}).get('status', 'n/a')}"},
                          {"type": "mrkdwn", "text": f"*H-P167-FRW2*\\n{hypo.get('H_P167_FRW2', {}).get('status', 'n/a')}"},
                          {"type": "mrkdwn", "text": f"*H-P167-FRW3*\\n{hypo.get('H_P167_FRW3', {}).get('status', 'n/a')}"},
                          {"type": "mrkdwn", "text": f"*H-P167-FRW4*\\n{hypo.get('H_P167_FRW4', {}).get('status', 'n/a')}"},
                      ],
                  },
              ],
          }
          with open(os.path.join(out_dir, "slack_payload.json"), "w") as f:
              json.dump(payload, f)
          PY

      - name: Upload p167 focused diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: p167-focused-nearhit-${{ steps.prepare.outputs.safe_label }}-${{ github.run_id }}
          path: ${{ steps.prepare.outputs.out_dir }}
          if-no-files-found: warn
          retention-days: ${{ steps.prepare.outputs.retention_days }}

  aggregate:
    name: Aggregate p167 focused diagnostic shards
    if: always()
    needs:
      - define-shards
      - p167-focused-diagnostic
    runs-on: ubuntu-24.04
    steps:
      - name: Download shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: downloaded-artifacts

      - name: Build aggregate summary
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-focused-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ needs.p167-focused-diagnostic.result }}
          EXPECTED_SHARDS: ${{ needs.define-shards.outputs.shard_jobs }}
          FANOUT: ${{ needs.define-shards.outputs.fanout }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import json
          import os

          attempts = 0
          score_improved = 0
          exactlike_improved = 0
          candidates = set()
          hypo_counts = {key: {} for key in ("H_P167_FRW1", "H_P167_FRW2", "H_P167_FRW3", "H_P167_FRW4", "H_P167_FRW5")}
          for path in glob.glob("downloaded-artifacts/*/p167_focused_attempts.jsonl"):
              with open(path) as f:
                  for line in f:
                      if not line.strip():
                          continue
                      attempts += 1
                      row = json.loads(line)
                      candidates.add(row.get("candidate_hash"))
                      score_improved += 1 if row.get("score_improvement_seen") else 0
                      exactlike_improved += 1 if row.get("exactlike_improvement_seen") else 0
          for path in glob.glob("downloaded-artifacts/*/p167_focused_hypothesis_evaluation.json"):
              with open(path) as f:
                  payload = json.load(f)
              for key in hypo_counts:
                  value = payload.get(key, {}).get("status", "missing")
                  hypo_counts[key][value] = hypo_counts[key].get(value, 0) + 1

          summary = {
              "status": os.environ["JOB_STATUS"].upper(),
              "run_label": os.environ["RUN_LABEL"],
              "run_url": os.environ["RUN_URL"],
              "expected_shards": int(os.environ.get("EXPECTED_SHARDS") or "0"),
              "observed_candidate_count": len(candidates),
              "attempt_count": attempts,
              "score_improvement_attempt_count": score_improved,
              "exactlike_improvement_attempt_count": exactlike_improved,
              "fanout": os.environ.get("FANOUT") == "true",
              "hypothesis_counts": hypo_counts,
          }
          with open("aggregate_summary.json", "w") as f:
              json.dump(summary, f, indent=2, sort_keys=True)
              f.write("\n")
          with open("aggregate_summary.md", "w") as f:
              f.write("# p167 focused near-hit diagnostic aggregate\n\n")
              for key in ("status", "run_label", "expected_shards", "observed_candidate_count", "attempt_count", "score_improvement_attempt_count", "exactlike_improvement_attempt_count"):
                  f.write(f"- {key}: `{summary[key]}`\n")
              f.write("\n```json\n")
              json.dump(summary, f, indent=2, sort_keys=True)
              f.write("\n```\n")
          payload = {
              "text": "p167 focused near-hit diagnostic aggregate",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*p167 focused near-hit diagnostic* <{summary['run_url']}|GitHub Actions run>",
                      },
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Status*\\n{summary['status']}"},
                          {"type": "mrkdwn", "text": f"*Label*\\n{summary['run_label']}"},
                          {"type": "mrkdwn", "text": f"*Candidates*\\n{summary['observed_candidate_count']}"},
                          {"type": "mrkdwn", "text": f"*Attempts*\\n{summary['attempt_count']}"},
                          {"type": "mrkdwn", "text": f"*Score improved*\\n{summary['score_improvement_attempt_count']}"},
                          {"type": "mrkdwn", "text": f"*Exact-like improved*\\n{summary['exactlike_improvement_attempt_count']}"},
                      ],
                  },
              ],
          }
          with open("aggregate_slack_payload.json", "w") as f:
              json.dump(payload, f)
          PY
          cat aggregate_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: p167-focused-nearhit-aggregate-${{ github.run_id }}
          path: |
            aggregate_summary.md
            aggregate_summary.json
            aggregate_slack_payload.json
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact_retention_days || '14' }}

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: aggregate_slack_payload.json
