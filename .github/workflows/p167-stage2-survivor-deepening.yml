name: p167 Stage 2 survivor deepening

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Short label for artifact and Slack messages"
        required: false
        default: "p167-stage2-smoke"
        type: string
      config:
        description: "Stage 2 deepening config"
        required: false
        default: "configs/experiments/p167_stage2_survivor_deepening.yaml"
        type: string
      stage1_run_id:
        description: "GitHub Actions run id containing Stage 1 aggregate artifact"
        required: false
        default: "25626432803"
        type: string
      stage1_artifact_name:
        description: "Stage 1 aggregate artifact name"
        required: false
        default: "p167-broad-stage1-aggregate-25626432803"
        type: string
      benchmark_trap_manifest:
        description: "Fixed score164/176 benchmark trap manifest"
        required: false
        default: "configs/fixtures/benchmark_traps/p167_score164_176.jsonl"
        type: string
      nearhit_fixture:
        description: "p167 near-hit fixture with candidate blocks"
        required: false
        default: "configs/fixtures/p167_focused_nearhit_candidates.jsonl"
        type: string
      operators:
        description: "Comma-separated Stage 2 operators"
        required: false
        default: "survivor_baseline_score_only"
        type: string
      survivor_limit:
        description: "Stage 1 survivors to include"
        required: false
        default: "1"
        type: string
      benchmark_trap_limit:
        description: "Benchmark trap controls to include"
        required: false
        default: "0"
        type: string
      random_control_limit:
        description: "Random controls to include"
        required: false
        default: "0"
        type: string
      nearhit_control_limit:
        description: "Near-hit controls to include"
        required: false
        default: "0"
        type: string
      restarts:
        description: "Restarts per candidate/operator"
        required: false
        default: "1"
        type: string
      steps:
        description: "Attempted steps per deepening trajectory"
        required: false
        default: "1"
        type: string
      sample_swaps:
        description: "Candidate swaps sampled per attempted step"
        required: false
        default: "5"
        type: string
      diagnostic_sample_count:
        description: "Sampled 1-swap diagnostics per snapshot"
        required: false
        default: "5"
        type: string
      snapshot_attempted_steps:
        description: "Attempted-step snapshot list"
        required: false
        default: "0,1"
        type: string
      snapshot_accepted_moves:
        description: "Accepted-move snapshot list"
        required: false
        default: "0,1"
        type: string
      high_resolution_logging:
        description: "Enable event-triggered accepted-move logging"
        required: false
        default: false
        type: boolean
      artifact_mode:
        description: "Artifact policy"
        required: false
        default: "summary_only"
        type: choice
        options:
          - "summary_only"
          - "summary_plus_raw"
      snapshot_log_mode:
        description: "Snapshot log policy for summary artifact"
        required: false
        default: "summary_only"
        type: choice
        options:
          - "summary_only"
          - "scheduled"
          - "triggered"
          - "full"
      operator_reward_log_mode:
        description: "Operator reward log policy for summary artifact"
        required: false
        default: "topk"
        type: choice
        options:
          - "summary_only"
          - "topk"
          - "sampled"
          - "full_compressed"
      operator_reward_topk:
        description: "Top-k reward rows per trajectory/operator to keep in summary"
        required: false
        default: "50"
        type: string
      max_tasks:
        description: "Maximum total tasks before sharding; 0 means all"
        required: false
        default: "1"
        type: string
      shard_count:
        description: "Shard count for fan-out"
        required: false
        default: "1"
        type: string
      max_parallel:
        description: "Maximum parallel shard jobs"
        required: false
        default: "1"
        type: string
  pull_request:
    paths:
      - "sage/75_p167_stage2_survivor_deepening.sage"
      - ".github/workflows/p167-stage2-survivor-deepening.yml"
      - "configs/experiments/p167_stage2_survivor_deepening.yaml"
      - "scripts/dispatch_p167_stage2.py"
      - "sage/06_known_sds_regression.sage"

permissions:
  contents: read
  actions: read

concurrency:
  group: p167-stage2-${{ github.ref }}-${{ inputs.run_label || github.event_name }}
  cancel-in-progress: false

env:
  SAGE_DOCKER_IMAGE: sagemath/sagemath:10.8
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  known-regression:
    name: Known SDS regression
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run known SDS regression
        run: |
          set -euo pipefail
          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "sage sage/06_known_sds_regression.sage"

  define-shards:
    name: Define shard matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
      shard_jobs: ${{ steps.matrix.outputs.shard_jobs }}
    steps:
      - name: Build matrix
        id: matrix
        env:
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          MAX_PARALLEL: ${{ inputs.max_parallel || '1' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          shard_count = int(os.environ.get("SHARD_COUNT") or "1")
          max_parallel = int(os.environ.get("MAX_PARALLEL") or "1")
          if shard_count < 1:
              raise SystemExit("shard_count must be >= 1")
          if max_parallel < 1:
              raise SystemExit("max_parallel must be >= 1")
          max_parallel = min(max_parallel, shard_count)
          width = max(2, len(str(shard_count - 1)))
          matrix = [
              {
                  "shard_index": idx,
                  "shard_suffix": "single" if shard_count == 1 else f"s{idx:0{width}d}",
              }
              for idx in range(shard_count)
          ]
          print(f"matrix={json.dumps({'include': matrix}, separators=(',', ':'))}")
          print(f"max_parallel={max_parallel}")
          print(f"shard_jobs={shard_count}")
          PY

  deepen:
    name: Run p167 Stage 2 deepening (${{ matrix.shard_suffix }})
    needs:
      - known-regression
      - define-shards
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.define-shards.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.define-shards.outputs.matrix) }}
    outputs:
      out_dir: ${{ steps.prepare.outputs.out_dir }}
      safe_label: ${{ steps.prepare.outputs.safe_label }}
      retention_days: ${{ steps.prepare.outputs.retention_days }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare run
        id: prepare
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-stage2-smoke' }}
          RETENTION_DAYS: "30"
          SHARD_SUFFIX: ${{ matrix.shard_suffix }}
        run: |
          set -euo pipefail

          if ! [[ "$RETENTION_DAYS" =~ ^[0-9]+$ ]] || [ "$RETENTION_DAYS" -lt 1 ] || [ "$RETENTION_DAYS" -gt 90 ]; then
            echo "::error::artifact_retention_days must be an integer from 1 to 90"
            exit 2
          fi

          raw_label="$RUN_LABEL"
          if [ "$SHARD_SUFFIX" != "single" ]; then
            raw_label="${RUN_LABEL}-${SHARD_SUFFIX}"
          fi

          safe_label="$(printf '%s' "$raw_label" | tr -c 'A-Za-z0-9_.-' '-')"
          safe_label="${safe_label:-p167-stage2-smoke}"
          out_dir="outputs/artifacts/${safe_label}-${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"

          {
            echo "safe_label=$safe_label"
            echo "out_dir=$out_dir"
            echo "retention_days=$RETENTION_DAYS"
          } >> "$GITHUB_OUTPUT"

      - name: Download Stage 1 aggregate artifact
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE1_RUN_ID: ${{ inputs.stage1_run_id || '25626432803' }}
          STAGE1_ARTIFACT_NAME: ${{ inputs.stage1_artifact_name || 'p167-broad-stage1-aggregate-25626432803' }}
        run: |
          set -euo pipefail
          rm -rf stage1-artifact
          mkdir -p stage1-artifact
          gh run download "$STAGE1_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            -n "$STAGE1_ARTIFACT_NAME" \
            -D stage1-artifact

      - name: Run p167 Stage 2 survivor deepening
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          CONFIG: ${{ inputs.config || 'configs/experiments/p167_stage2_survivor_deepening.yaml' }}
          TUPLE_REGISTRY: configs/fixtures/p167_tuple_classes.json
          STAGE1_ARTIFACT: stage1-artifact
          BENCHMARK_TRAP_MANIFEST: ${{ inputs.benchmark_trap_manifest || 'configs/fixtures/benchmark_traps/p167_score164_176.jsonl' }}
          NEARHIT_FIXTURE: ${{ inputs.nearhit_fixture || 'configs/fixtures/p167_focused_nearhit_candidates.jsonl' }}
          OPERATORS: ${{ inputs.operators || 'survivor_baseline_score_only' }}
          SURVIVOR_LIMIT: ${{ inputs.survivor_limit || '1' }}
          BENCHMARK_TRAP_LIMIT: ${{ inputs.benchmark_trap_limit || '0' }}
          RANDOM_CONTROL_LIMIT: ${{ inputs.random_control_limit || '0' }}
          NEARHIT_CONTROL_LIMIT: ${{ inputs.nearhit_control_limit || '0' }}
          TOTAL_CANDIDATE_LIMIT: "100"
          RESTARTS: ${{ inputs.restarts || '1' }}
          STEPS: ${{ inputs.steps || '1' }}
          SAMPLE_SWAPS: ${{ inputs.sample_swaps || '5' }}
          DIAGNOSTIC_SAMPLE_COUNT: ${{ inputs.diagnostic_sample_count || '5' }}
          SNAPSHOT_ATTEMPTED_STEPS: ${{ inputs.snapshot_attempted_steps || '0,1' }}
          SNAPSHOT_ACCEPTED_MOVES: ${{ inputs.snapshot_accepted_moves || '0,1' }}
          HIGH_RESOLUTION_LOGGING: ${{ inputs.high_resolution_logging || 'false' }}
          HIGH_RESOLUTION_MODE: "triggered"
          HIGH_RESOLUTION_MAX_WINDOWS_PER_TRAJECTORY: "2"
          HIGH_RESOLUTION_WINDOW_ACCEPTED_MOVES: "50"
          HIGHRES_FOLLOWUP_ACCEPTED_MOVES: "50"
          ARTIFACT_MODE: ${{ inputs.artifact_mode || 'summary_only' }}
          COMPRESS_RAW_LOGS: "true"
          UPLOAD_RAW_LOGS: "false"
          SNAPSHOT_LOG_MODE: ${{ inputs.snapshot_log_mode || 'summary_only' }}
          OPERATOR_REWARD_LOG_MODE: ${{ inputs.operator_reward_log_mode || 'topk' }}
          OPERATOR_REWARD_TOPK: ${{ inputs.operator_reward_topk || '50' }}
          OPERATOR_REWARD_SAMPLE_RATE: "0.01"
          MAX_TASKS: ${{ inputs.max_tasks || '1' }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          RUN_LABEL: ${{ inputs.run_label || 'p167-stage2-smoke' }}
          STAGE_NAME: "p167_stage2"
          STAGE3_CANDIDATE_LIMIT: "50"
        run: |
          set -euo pipefail

          args=(
            sage sage/75_p167_stage2_survivor_deepening.sage
            --config "$CONFIG"
            --tuple-registry "$TUPLE_REGISTRY"
            --stage1-artifact "$STAGE1_ARTIFACT"
            --benchmark-trap-manifest "$BENCHMARK_TRAP_MANIFEST"
            --nearhit-fixture "$NEARHIT_FIXTURE"
            --operators "$OPERATORS"
            --survivor-limit "$SURVIVOR_LIMIT"
            --benchmark-trap-limit "$BENCHMARK_TRAP_LIMIT"
            --random-control-limit "$RANDOM_CONTROL_LIMIT"
            --nearhit-control-limit "$NEARHIT_CONTROL_LIMIT"
            --total-candidate-limit "$TOTAL_CANDIDATE_LIMIT"
            --restarts "$RESTARTS"
            --steps "$STEPS"
            --sample-swaps "$SAMPLE_SWAPS"
            --diagnostic-sample-count "$DIAGNOSTIC_SAMPLE_COUNT"
            --snapshot-attempted-steps "$SNAPSHOT_ATTEMPTED_STEPS"
            --snapshot-accepted-moves "$SNAPSHOT_ACCEPTED_MOVES"
            --highres-followup-accepted-moves "$HIGHRES_FOLLOWUP_ACCEPTED_MOVES"
            --high-resolution-mode "$HIGH_RESOLUTION_MODE"
            --high-resolution-max-windows-per-trajectory "$HIGH_RESOLUTION_MAX_WINDOWS_PER_TRAJECTORY"
            --high-resolution-window-accepted-moves "$HIGH_RESOLUTION_WINDOW_ACCEPTED_MOVES"
            --artifact-mode "$ARTIFACT_MODE"
            --snapshot-log-mode "$SNAPSHOT_LOG_MODE"
            --operator-reward-log-mode "$OPERATOR_REWARD_LOG_MODE"
            --operator-reward-topk "$OPERATOR_REWARD_TOPK"
            --operator-reward-sample-rate "$OPERATOR_REWARD_SAMPLE_RATE"
            --max-tasks "$MAX_TASKS"
            --shard-index "$SHARD_INDEX"
            --shard-count "$SHARD_COUNT"
            --github-run-id "$GITHUB_RUN_ID"
            --code-commit "$GITHUB_SHA"
            --run-label "$RUN_LABEL"
            --stage-name "$STAGE_NAME"
            --stage3-candidate-limit "$STAGE3_CANDIDATE_LIMIT"
            --out-dir "$OUT_DIR"
          )
          if [ "$HIGH_RESOLUTION_LOGGING" = "true" ]; then
            args+=(--high-resolution-logging)
          else
            args+=(--disable-high-resolution-logging)
          fi
          if [ "$COMPRESS_RAW_LOGS" = "true" ]; then
            args+=(--compress-raw-logs)
          else
            args+=(--no-compress-raw-logs)
          fi
          if [ "$UPLOAD_RAW_LOGS" = "true" ]; then
            args+=(--upload-raw-logs)
          else
            args+=(--disable-raw-log-upload)
          fi
          sage_command="$(printf '%q ' "${args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee "$OUT_DIR/runner.log"

      - name: Validate generated score0 candidates
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          score0_files=("$OUT_DIR"/score0_candidates/*.json)
          if [ "${#score0_files[@]}" -eq 0 ]; then
            echo "No generated score0 candidates to validate."
            exit 0
          fi
          for candidate in "${score0_files[@]}"; do
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/08_analyze_sds_candidate.sage '$candidate'"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/05_validate_candidate_json.sage '$candidate'"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/04_build_gs_from_sds.sage '$candidate'"
          done

      - name: Build GitHub summary
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          {
            echo "## p167 Stage 2 survivor deepening"
            echo
            if [ -f "$OUT_DIR/p167_stage2_survivor_deepening_summary.md" ]; then
              sed -n '1,320p' "$OUT_DIR/p167_stage2_survivor_deepening_summary.md"
            else
              echo "Summary was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload p167 Stage 2 summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: p167-stage2-summary-${{ steps.prepare.outputs.safe_label }}-${{ github.run_id }}
          path: |
            ${{ steps.prepare.outputs.out_dir }}
            !${{ steps.prepare.outputs.out_dir }}/raw_logs/**
          if-no-files-found: warn
          retention-days: ${{ steps.prepare.outputs.retention_days }}

      - name: Upload p167 Stage 2 raw/debug logs
        if: always() && inputs.artifact_mode == 'summary_plus_raw'
        uses: actions/upload-artifact@v7
        with:
          name: p167-stage2-raw-logs-${{ steps.prepare.outputs.safe_label }}-${{ github.run_id }}
          path: ${{ steps.prepare.outputs.out_dir }}/raw_logs
          if-no-files-found: warn
          retention-days: ${{ steps.prepare.outputs.retention_days }}

  aggregate:
    name: Aggregate p167 Stage 2 shards
    if: always()
    needs:
      - define-shards
      - deepen
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: downloaded-artifacts
          pattern: p167-stage2-summary-*
          merge-multiple: false

      - name: Aggregate shard outputs
        env:
          EXPECTED_SHARDS: ${{ needs.define-shards.outputs.shard_jobs }}
          CONFIG: ${{ inputs.config || 'configs/experiments/p167_stage2_survivor_deepening.yaml' }}
          TUPLE_REGISTRY: configs/fixtures/p167_tuple_classes.json
          STAGE1_ARTIFACT: stage1-artifact
          BENCHMARK_TRAP_MANIFEST: ${{ inputs.benchmark_trap_manifest || 'configs/fixtures/benchmark_traps/p167_score164_176.jsonl' }}
          NEARHIT_FIXTURE: ${{ inputs.nearhit_fixture || 'configs/fixtures/p167_focused_nearhit_candidates.jsonl' }}
          RUN_LABEL: ${{ inputs.run_label || 'p167-stage2-smoke' }}
          STAGE_NAME: "p167_stage2"
          STAGE3_CANDIDATE_LIMIT: "50"
          HIGH_RESOLUTION_LOGGING: ${{ inputs.high_resolution_logging || 'false' }}
          HIGH_RESOLUTION_MODE: "triggered"
          HIGH_RESOLUTION_MAX_WINDOWS_PER_TRAJECTORY: "2"
          HIGH_RESOLUTION_WINDOW_ACCEPTED_MOVES: "50"
          ARTIFACT_MODE: ${{ inputs.artifact_mode || 'summary_only' }}
          COMPRESS_RAW_LOGS: "true"
          UPLOAD_RAW_LOGS: "false"
          SNAPSHOT_LOG_MODE: ${{ inputs.snapshot_log_mode || 'summary_only' }}
          OPERATOR_REWARD_LOG_MODE: ${{ inputs.operator_reward_log_mode || 'topk' }}
          OPERATOR_REWARD_TOPK: ${{ inputs.operator_reward_topk || '50' }}
          OPERATOR_REWARD_SAMPLE_RATE: "0.01"
        run: |
          set -euo pipefail
          mkdir -p aggregate-output stage1-artifact
          args=(
            sage sage/75_p167_stage2_survivor_deepening.sage
            --config "$CONFIG"
            --tuple-registry "$TUPLE_REGISTRY"
            --stage1-artifact "$STAGE1_ARTIFACT"
            --benchmark-trap-manifest "$BENCHMARK_TRAP_MANIFEST"
            --nearhit-fixture "$NEARHIT_FIXTURE"
            --aggregate-roots downloaded-artifacts
            --shard-count "$EXPECTED_SHARDS"
            --code-commit "$GITHUB_SHA"
            --run-label "$RUN_LABEL"
            --stage-name "$STAGE_NAME"
            --stage3-candidate-limit "$STAGE3_CANDIDATE_LIMIT"
            --high-resolution-mode "$HIGH_RESOLUTION_MODE"
            --high-resolution-max-windows-per-trajectory "$HIGH_RESOLUTION_MAX_WINDOWS_PER_TRAJECTORY"
            --high-resolution-window-accepted-moves "$HIGH_RESOLUTION_WINDOW_ACCEPTED_MOVES"
            --artifact-mode "$ARTIFACT_MODE"
            --snapshot-log-mode "$SNAPSHOT_LOG_MODE"
            --operator-reward-log-mode "$OPERATOR_REWARD_LOG_MODE"
            --operator-reward-topk "$OPERATOR_REWARD_TOPK"
            --operator-reward-sample-rate "$OPERATOR_REWARD_SAMPLE_RATE"
            --out-dir aggregate-output
          )
          if [ "$HIGH_RESOLUTION_LOGGING" = "true" ]; then
            args+=(--high-resolution-logging)
          else
            args+=(--disable-high-resolution-logging)
          fi
          if [ "$COMPRESS_RAW_LOGS" = "true" ]; then
            args+=(--compress-raw-logs)
          else
            args+=(--no-compress-raw-logs)
          fi
          if [ "$UPLOAD_RAW_LOGS" = "true" ]; then
            args+=(--upload-raw-logs)
          else
            args+=(--disable-raw-log-upload)
          fi
          sage_command="$(printf '%q ' "${args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee aggregate-output/aggregate-runner.log

      - name: Build aggregate Slack payload
        if: always()
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-stage2-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ needs.deepen.result }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          config = {}
          hypotheses = {}
          runtime = []
          for name, target in (
              ("aggregate-output/run_config.json", config),
              ("aggregate-output/hypothesis_evaluation.json", hypotheses),
          ):
              if os.path.exists(name):
                  with open(name) as f:
                      payload = json.load(f)
                  target.update(payload)
          if os.path.exists("aggregate-output/runtime_summary.json"):
              with open("aggregate-output/runtime_summary.json") as f:
                  runtime = json.load(f)

          status = os.environ["JOB_STATUS"].upper()
          label = os.environ["RUN_LABEL"]
          run_url = os.environ["RUN_URL"]
          stage3_status = hypotheses.get("H_STAGE2_6_stage3_candidates_available", {}).get("status", "n/a")
          routing_status = hypotheses.get("H_STAGE2_2_routing_beats_baseline", {}).get("status", "n/a")
          runtime_seconds = runtime[0].get("total_runtime_seconds", "n/a") if runtime else "n/a"
          payload = {
              "text": "p167 Stage 2 survivor deepening",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*p167 Stage 2 survivor deepening* <{run_url}|GitHub Actions run>",
                      },
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Status*\\n{status}"},
                          {"type": "mrkdwn", "text": f"*Label*\\n{label}"},
                          {"type": "mrkdwn", "text": f"*Run rows*\\n{config.get('run_rows', 'n/a')}"},
                          {"type": "mrkdwn", "text": f"*Snapshots*\\n{config.get('snapshot_rows', 'n/a')}"},
                          {"type": "mrkdwn", "text": f"*Routing*\\n{routing_status}"},
                          {"type": "mrkdwn", "text": f"*Stage3*\\n{stage3_status}"},
                          {"type": "mrkdwn", "text": f"*Runtime s*\\n{runtime_seconds}"},
                      ],
                  },
              ],
          }
          with open("aggregate-output/aggregate_slack_payload.json", "w") as f:
              json.dump(payload, f)
          PY

      - name: Build aggregate GitHub summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## p167 Stage 2 survivor deepening aggregate"
            echo
            if [ -f "aggregate-output/p167_stage2_survivor_deepening_summary.md" ]; then
              sed -n '1,380p' "aggregate-output/p167_stage2_survivor_deepening_summary.md"
            else
              echo "Aggregate summary was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: p167-stage2-summary-aggregate-${{ github.run_id }}
          path: |
            aggregate-output
            !aggregate-output/raw_logs/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload aggregate raw/debug logs
        if: always() && inputs.artifact_mode == 'summary_plus_raw'
        uses: actions/upload-artifact@v7
        with:
          name: p167-stage2-raw-logs-aggregate-${{ github.run_id }}
          path: aggregate-output/raw_logs
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: aggregate-output/aggregate_slack_payload.json
