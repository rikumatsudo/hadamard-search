name: p167 pair-level MITM repair diagnostic

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Short label for artifact and Slack messages"
        required: false
        default: "p167-pair-mitm-smoke"
        type: string
      candidate_roots:
        description: "Comma-separated candidate files/directories"
        required: false
        default: "configs/fixtures/p167_focused_nearhit_candidates.jsonl,outputs/candidates/near_hits"
        type: string
      artifact_run_id:
        description: "Optional prior GitHub Actions run id whose artifacts contain extra p167 near-hit candidates"
        required: false
        default: ""
        type: string
      download_prior_artifacts:
        description: "Download prior artifacts before analysis"
        required: false
        default: false
        type: boolean
      max_candidates:
        description: "Maximum selected p167 near-hit candidates"
        required: false
        default: "400"
        type: string
      max_score:
        description: "Maximum score to include"
        required: false
        default: "232"
        type: string
      score_set:
        description: "Comma-separated scores to include"
        required: false
        default: "164,176,180,184,188,192,200,216,228,232"
        type: string
      modes:
        description: "Comma-separated repair/generation modes"
        required: false
        default: "baseline_score_only_recheck,pair_profile_plus_movespace_filter,hybrid_pair_repair_to_closure_shell,exact_joint_pair_lns,sketch_mitm_pair_generation,focused_plus_small_threshold_reference"
        type: string
      splits:
        description: "Comma-separated pair splits"
        required: false
        default: "split_01_23"
        type: string
      repair_samples:
        description: "Move samples per candidate/split/mode step"
        required: false
        default: "300"
        type: string
      repair_steps:
        description: "Sequential repair steps"
        required: false
        default: "80"
        type: string
      restarts:
        description: "Restarts per candidate/mode/split"
        required: false
        default: "5"
        type: string
      diagnostic_swaps:
        description: "Sampled move-space diagnostics per state"
        required: false
        default: "60"
        type: string
      eval_top_k:
        description: "Full exact rescoring limit after linear prefilter"
        required: false
        default: "20"
        type: string
      mitm_sketch_candidates:
        description: "Approximate MITM generated candidates budget per shard"
        required: false
        default: "3000"
        type: string
      snapshot_interval:
        description: "Snapshot interval in repair steps"
        required: false
        default: "100"
        type: string
      shard_count:
        description: "Shard count for production fan-out"
        required: false
        default: "40"
        type: string
      max_parallel:
        description: "Maximum parallel shard jobs"
        required: false
        default: "40"
        type: string
      artifact_retention_days:
        description: "Artifact retention, 1-90 days"
        required: false
        default: "14"
        type: string
  pull_request:
    paths:
      - "sage/72_p167_pair_level_mitm_repair_diagnostic.sage"
      - ".github/workflows/p167-pair-level-mitm-repair.yml"
      - "sage/06_known_sds_regression.sage"
      - "configs/fixtures/p167_focused_nearhit_candidates.jsonl"
      - "outputs/candidates/near_hits/**"

permissions:
  contents: read
  actions: read

concurrency:
  group: p167-pair-mitm-${{ github.ref }}-${{ inputs.run_label || github.event_name }}
  cancel-in-progress: false

env:
  SAGE_DOCKER_IMAGE: sagemath/sagemath:10.8
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  known-regression:
    name: Known SDS regression
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run known SDS regression
        run: |
          set -euo pipefail
          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "sage sage/06_known_sds_regression.sage"

  define-shards:
    name: Define shard matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
      shard_jobs: ${{ steps.matrix.outputs.shard_jobs }}
      fanout: ${{ steps.matrix.outputs.fanout }}
    steps:
      - name: Build matrix
        id: matrix
        env:
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          MAX_PARALLEL: ${{ inputs.max_parallel || '1' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          shard_count = int(os.environ.get("SHARD_COUNT") or "1")
          max_parallel = int(os.environ.get("MAX_PARALLEL") or "1")
          if shard_count < 1:
              raise SystemExit("shard_count must be >= 1")
          if max_parallel < 1:
              raise SystemExit("max_parallel must be >= 1")
          max_parallel = min(max_parallel, shard_count)
          width = max(2, len(str(shard_count - 1)))
          matrix = [
              {
                  "shard_index": idx,
                  "shard_suffix": "single" if shard_count == 1 else f"s{idx:0{width}d}",
              }
              for idx in range(shard_count)
          ]
          print(f"matrix={json.dumps({'include': matrix}, separators=(',', ':'))}")
          print(f"max_parallel={max_parallel}")
          print(f"shard_jobs={shard_count}")
          print(f"fanout={'true' if shard_count > 1 else 'false'}")
          PY

  prepare-prior-artifacts:
    name: Prepare prior artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Download prior p167 artifacts once
        if: github.event_name == 'workflow_dispatch' && inputs.download_prior_artifacts == true
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || '' }}
        run: |
          set -euo pipefail
          if [ -z "$ARTIFACT_RUN_ID" ]; then
            echo "::error::artifact_run_id is required when download_prior_artifacts=true"
            exit 2
          fi
          mkdir -p prior-artifacts
          for attempt in 1 2 3; do
            if gh run download "$ARTIFACT_RUN_ID" --repo "$GITHUB_REPOSITORY" --dir prior-artifacts; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "::error::failed to download prior artifacts from run $ARTIFACT_RUN_ID"
          exit 2

      - name: Create empty prior artifact placeholder
        if: github.event_name != 'workflow_dispatch' || inputs.download_prior_artifacts != true
        run: |
          set -euo pipefail
          mkdir -p prior-artifacts
          touch prior-artifacts/EMPTY

      - name: Upload prepared prior artifacts
        uses: actions/upload-artifact@v6
        with:
          name: p167-pair-mitm-prior-artifacts-${{ github.run_id }}
          path: prior-artifacts
          retention-days: 1

  pair-mitm-repair:
    name: Run p167 pair MITM repair (${{ matrix.shard_suffix }})
    needs:
      - known-regression
      - define-shards
      - prepare-prior-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.define-shards.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.define-shards.outputs.matrix) }}
    outputs:
      out_dir: ${{ steps.prepare.outputs.out_dir }}
      safe_label: ${{ steps.prepare.outputs.safe_label }}
      retention_days: ${{ steps.prepare.outputs.retention_days }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download prepared prior artifacts
        uses: actions/download-artifact@v6
        with:
          name: p167-pair-mitm-prior-artifacts-${{ github.run_id }}
          path: prior-artifacts

      - name: Prepare run
        id: prepare
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-pair-mitm-smoke' }}
          RETENTION_DAYS: ${{ inputs.artifact_retention_days || '14' }}
          SHARD_SUFFIX: ${{ matrix.shard_suffix }}
        run: |
          set -euo pipefail

          if ! [[ "$RETENTION_DAYS" =~ ^[0-9]+$ ]] || [ "$RETENTION_DAYS" -lt 1 ] || [ "$RETENTION_DAYS" -gt 90 ]; then
            echo "::error::artifact_retention_days must be an integer from 1 to 90"
            exit 2
          fi

          raw_label="$RUN_LABEL"
          if [ "$SHARD_SUFFIX" != "single" ]; then
            raw_label="${RUN_LABEL}-${SHARD_SUFFIX}"
          fi

          safe_label="$(printf '%s' "$raw_label" | tr -c 'A-Za-z0-9_.-' '-')"
          safe_label="${safe_label:-p167-pair-mitm-smoke}"
          out_dir="outputs/artifacts/${safe_label}-${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"

          {
            echo "safe_label=$safe_label"
            echo "out_dir=$out_dir"
            echo "retention_days=$RETENTION_DAYS"
          } >> "$GITHUB_OUTPUT"

      - name: Run p167 pair-level MITM repair diagnostic
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          CANDIDATE_ROOTS: ${{ inputs.candidate_roots || 'configs/fixtures/p167_focused_nearhit_candidates.jsonl,outputs/candidates/near_hits' }}
          MAX_CANDIDATES: ${{ inputs.max_candidates || '2' }}
          MAX_SCORE: ${{ inputs.max_score || '232' }}
          SCORE_SET: ${{ inputs.score_set || '164,176,180,184,188,192,200,216,228,232' }}
          MODES: ${{ inputs.modes || 'baseline_score_only_recheck' }}
          SPLITS: ${{ inputs.splits || 'split_01_23' }}
          REPAIR_SAMPLES: ${{ inputs.repair_samples || '5' }}
          REPAIR_STEPS: ${{ inputs.repair_steps || '1' }}
          RESTARTS: ${{ inputs.restarts || '1' }}
          DIAGNOSTIC_SWAPS: ${{ inputs.diagnostic_swaps || '30' }}
          EVAL_TOP_K: ${{ inputs.eval_top_k || '20' }}
          MITM_SKETCH_CANDIDATES: ${{ inputs.mitm_sketch_candidates || '20' }}
          SNAPSHOT_INTERVAL: ${{ inputs.snapshot_interval || '100' }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: |
          set -euo pipefail

          args=(
            sage sage/72_p167_pair_level_mitm_repair_diagnostic.sage
            --candidate-roots "$CANDIDATE_ROOTS"
            --max-candidates "$MAX_CANDIDATES"
            --max-score "$MAX_SCORE"
            --score-set "$SCORE_SET"
            --modes "$MODES"
            --splits "$SPLITS"
            --restarts "$RESTARTS"
            --repair-samples "$REPAIR_SAMPLES"
            --repair-steps "$REPAIR_STEPS"
            --diagnostic-swaps "$DIAGNOSTIC_SWAPS"
            --eval-top-k "$EVAL_TOP_K"
            --mitm-sketch-candidates "$MITM_SKETCH_CANDIDATES"
            --snapshot-interval "$SNAPSHOT_INTERVAL"
            --shard-index "$SHARD_INDEX"
            --shard-count "$SHARD_COUNT"
            --out-dir "$OUT_DIR"
          )
          sage_command="$(printf '%q ' "${args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee "$OUT_DIR/runner.log"

      - name: Validate generated score0 candidates
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          score0_files=("$OUT_DIR"/score0_candidates/*.json)
          if [ "${#score0_files[@]}" -eq 0 ]; then
            echo "No generated score0 candidates to validate."
            exit 0
          fi
          for candidate in "${score0_files[@]}"; do
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/08_analyze_sds_candidate.sage '$candidate'"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/05_validate_candidate_json.sage '$candidate'"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" "sage sage/04_build_gs_from_sds.sage '$candidate'"
          done

      - name: Build GitHub summary
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          {
            echo "## p167 pair-level MITM repair diagnostic"
            echo
            if [ -f "$OUT_DIR/p167_pair_level_mitm_repair_diagnostic_summary.md" ]; then
              sed -n '1,220p' "$OUT_DIR/p167_pair_level_mitm_repair_diagnostic_summary.md"
            else
              echo "Summary was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Slack payload
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          RUN_LABEL: ${{ inputs.run_label || 'p167-pair-mitm-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          out_dir = os.environ["OUT_DIR"]
          label = os.environ["RUN_LABEL"]
          status = os.environ["JOB_STATUS"].upper()
          run_url = os.environ["RUN_URL"]
          hypo_path = os.path.join(out_dir, "p167_pair_mitm_hypothesis_evaluation.json")
          hypo = {}
          if os.path.exists(hypo_path):
              with open(hypo_path) as f:
                  hypo = json.load(f)
          payload = {
              "text": "p167 pair-level MITM repair diagnostic GitHub Actions run",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*p167 pair-level MITM repair* <{run_url}|GitHub Actions run>",
                      },
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Status*\n{status}"},
                          {"type": "mrkdwn", "text": f"*Label*\n{label}"},
                          {"type": "mrkdwn", "text": f"*H-P167-MITM1*\n{hypo.get('H_P167_MITM1', {}).get('status', 'unknown')}"},
                          {"type": "mrkdwn", "text": f"*H-P167-MITM3*\n{hypo.get('H_P167_MITM3', {}).get('status', 'unknown')}"},
                      ],
                  },
              ],
          }
          with open(os.path.join(out_dir, "slack_payload.json"), "w") as f:
              json.dump(payload, f, indent=2)
          PY

      - name: Upload p167 pair MITM repair artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: p167-pair-mitm-${{ steps.prepare.outputs.safe_label }}-${{ github.run_id }}
          path: ${{ steps.prepare.outputs.out_dir }}
          retention-days: ${{ fromJSON(steps.prepare.outputs.retention_days) }}

  aggregate:
    name: Aggregate p167 pair MITM repair shards
    needs:
      - define-shards
      - pair-mitm-repair
    if: always() && needs.pair-mitm-repair.result != 'cancelled'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shard artifacts
        uses: actions/download-artifact@v6
        with:
          path: shard-artifacts
          pattern: p167-pair-mitm-*

      - name: Build aggregate outputs
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-pair-mitm-smoke' }}
          RETENTION_DAYS: ${{ inputs.artifact_retention_days || '14' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FANOUT: ${{ needs.define-shards.outputs.fanout }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: |
          set -euo pipefail

          safe_label="$(printf '%s' "$RUN_LABEL-aggregate" | tr -c 'A-Za-z0-9_.-' '-')"
          out_dir="outputs/artifacts/${safe_label}-${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"

          args=(
            sage sage/72_p167_pair_level_mitm_repair_diagnostic.sage
            --aggregate-roots shard-artifacts
            --out-dir "$out_dir"
          )
          sage_command="$(printf '%q ' "${args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee "$out_dir/aggregate_runner.log"

        shell: bash

      - name: Summarize aggregate
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-pair-mitm-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: |
          set -euo pipefail
          out_dir="$(find outputs/artifacts -maxdepth 1 -type d -name "*aggregate*-${GITHUB_RUN_ID}" | head -n 1)"
          if [ -z "$out_dir" ]; then
            echo "::error::aggregate output directory not found"
            exit 2
          fi
          python3 - "$out_dir" <<'PY'
          import json
          import os
          import sys

          out_dir = sys.argv[1]
          hypo_path = os.path.join(out_dir, "p167_pair_mitm_hypothesis_evaluation.json")
          hypotheses = {}
          if os.path.exists(hypo_path):
              with open(hypo_path) as f:
                  hypotheses = json.load(f)
          attempts_path = os.path.join(out_dir, "p167_pair_mitm_attempts.jsonl")
          attempts = 0
          if os.path.exists(attempts_path):
              with open(attempts_path) as f:
                  attempts = sum(1 for line in f if line.strip())
          candidates_path = os.path.join(out_dir, "input_p167_pair_mitm_candidates.jsonl")
          candidates = 0
          if os.path.exists(candidates_path):
              with open(candidates_path) as f:
                  candidates = sum(1 for line in f if line.strip())
          summary = {
              "status": "SUCCESS",
              "run_label": os.environ["RUN_LABEL"],
              "run_url": os.environ["RUN_URL"],
              "expected_shards": int(os.environ["SHARD_COUNT"]),
              "observed_candidate_count": candidates,
              "attempt_count": attempts,
              "hypotheses": {key: value.get("status") for key, value in sorted(hypotheses.items())},
          }
          with open(os.path.join(out_dir, "aggregate_summary.json"), "w") as f:
              json.dump(summary, f, indent=2, sort_keys=True)
          with open(os.path.join(out_dir, "aggregate_summary.md"), "w") as f:
              f.write("# p167 pair-level MITM repair aggregate\n\n")
              for key, value in summary.items():
                  f.write(f"- {key}: `{value}`\n")
          PY
          {
            echo "## p167 pair-level MITM repair aggregate"
            echo
            sed -n '1,240p' "$out_dir/p167_pair_level_mitm_repair_diagnostic_summary.md"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "OUT_DIR=$out_dir" >> "$GITHUB_ENV"

      - name: Upload aggregate summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: p167-pair-mitm-aggregate-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}
          retention-days: ${{ fromJSON(inputs.artifact_retention_days || '14') }}

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p167-pair-mitm-smoke' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          out_dir="$OUT_DIR"
          python3 - <<'PY'
          import json
          import os

          out_dir = os.environ["OUT_DIR"]
          label = os.environ["RUN_LABEL"]
          run_url = os.environ["RUN_URL"]
          status = os.environ["JOB_STATUS"].upper()
          summary_path = os.path.join(out_dir, "aggregate_summary.json")
          summary = {}
          if os.path.exists(summary_path):
              with open(summary_path) as f:
                  summary = json.load(f)
          payload = {
              "text": "p167 pair-level MITM repair aggregate",
              "blocks": [
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*p167 pair MITM repair* <{run_url}|GitHub Actions run>"},
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Status*\n{status}"},
                          {"type": "mrkdwn", "text": f"*Label*\n{label}"},
                          {"type": "mrkdwn", "text": f"*Candidates*\n{summary.get('observed_candidate_count', 'unknown')}"},
                          {"type": "mrkdwn", "text": f"*Attempts*\n{summary.get('attempt_count', 'unknown')}"},
                      ],
                  },
              ],
          }
          with open(os.path.join(out_dir, "aggregate_slack_payload.json"), "w") as f:
              json.dump(payload, f, indent=2)
          PY
          curl -sS -X POST -H 'Content-type: application/json' --data @"$out_dir/aggregate_slack_payload.json" "$SLACK_WEBHOOK_URL" >/dev/null
