name: Research experiment

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Experiment config under configs/experiments/"
        required: true
        default: "configs/experiments/p167_tuple_A_actions_smoke.yaml"
        type: string
      engine:
        description: "Search engine. Use sage for exact-like runner, rust for Rust search + Sage verification."
        required: false
        default: "sage"
        type: choice
        options:
          - sage
          - rust
      run_label:
        description: "Short label for artifact and Slack messages"
        required: false
        default: "manual"
        type: string
      seeds:
        description: "Override run.seeds. Leave blank to use config."
        required: false
        default: ""
        type: string
      seed_start:
        description: "First seed index for a direct seed range. Leave blank for 0."
        required: false
        default: ""
        type: string
      seed_count:
        description: "Number of seeds for a direct seed range. Leave blank to use seeds."
        required: false
        default: ""
        type: string
      total_seeds:
        description: "Total seed count to split across shards."
        required: false
        default: ""
        type: string
      shard_index:
        description: "Zero-based shard index for seed fan-out."
        required: false
        default: ""
        type: string
      shard_count:
        description: "Shard count for seed fan-out, e.g. 20 or 40."
        required: false
        default: ""
        type: string
      steps:
        description: "Override run.steps. Leave blank to use config."
        required: false
        default: ""
        type: string
      snapshot_interval:
        description: "Override run.snapshot_interval. Leave blank to use config."
        required: false
        default: ""
        type: string
      candidates_per_family:
        description: "Override initialization.candidates_per_family. Leave blank to use config."
        required: false
        default: ""
        type: string
      selected_per_family:
        description: "Override initialization.selected_per_family. Leave blank to use config."
        required: false
        default: ""
        type: string
      max_repair_candidates:
        description: "Maximum routed repair candidates."
        required: false
        default: ""
        type: string
      max_parallel:
        description: "Maximum parallel shard jobs for matrix fan-out."
        required: false
        default: "40"
        type: string
      artifact_retention_days:
        description: "Artifact retention, 1-90 days."
        required: false
        default: "14"
        type: string

permissions:
  contents: read

concurrency:
  group: research-${{ github.ref }}-${{ inputs.run_label }}
  cancel-in-progress: false

env:
  SAGE_DOCKER_IMAGE: sagemath/sagemath:10.8
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  define-shards:
    name: Define shard matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
      shard_jobs: ${{ steps.matrix.outputs.shard_jobs }}
      fanout: ${{ steps.matrix.outputs.fanout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build matrix
        id: matrix
        env:
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count }}
          MAX_PARALLEL: ${{ inputs.max_parallel }}
        run: |
          set -euo pipefail
          python3 scripts/actions_shard_matrix.py

  run:
    name: Run ${{ inputs.engine }} experiment (${{ matrix.shard_suffix }})
    needs: define-shards
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.define-shards.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.define-shards.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare run
        id: prepare
        env:
          CONFIG: ${{ inputs.config }}
          ENGINE: ${{ inputs.engine }}
          RUN_LABEL: ${{ inputs.run_label }}
          SHARD_SUFFIX: ${{ matrix.shard_suffix }}
          RETENTION_DAYS: ${{ inputs.artifact_retention_days }}
        run: |
          set -euo pipefail

          case "$CONFIG" in
            configs/experiments/*.yaml) ;;
            *)
              echo "::error::config must be under configs/experiments/*.yaml"
              exit 2
              ;;
          esac
          test -f "$CONFIG"

          case "$ENGINE" in
            sage|rust) ;;
            *)
              echo "::error::engine must be sage or rust"
              exit 2
              ;;
          esac

          if ! [[ "$RETENTION_DAYS" =~ ^[0-9]+$ ]] || [ "$RETENTION_DAYS" -lt 1 ] || [ "$RETENTION_DAYS" -gt 90 ]; then
            echo "::error::artifact_retention_days must be an integer from 1 to 90"
            exit 2
          fi

          raw_label="$RUN_LABEL"
          if [ "$SHARD_SUFFIX" != "single" ]; then
            raw_label="${RUN_LABEL}-${SHARD_SUFFIX}"
          fi

          safe_label="$(printf '%s' "$raw_label" | tr -c 'A-Za-z0-9_.-' '-')"
          safe_label="${safe_label:-manual}"
          out_dir="outputs/artifacts/${safe_label}-${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"

          {
            echo "raw_label=$raw_label"
            echo "safe_label=$safe_label"
            echo "out_dir=$out_dir"
            echo "engine=$ENGINE"
            echo "retention_days=$RETENTION_DAYS"
          } >> "$GITHUB_OUTPUT"

      - name: Run exact-like guided generator
        if: ${{ inputs.engine == 'sage' }}
        id: experiment
        env:
          CONFIG: ${{ inputs.config }}
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          SEEDS: ${{ inputs.seeds }}
          SEED_START: ${{ inputs.seed_start }}
          SEED_COUNT: ${{ inputs.seed_count }}
          TOTAL_SEEDS: ${{ inputs.total_seeds }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count }}
          STEPS: ${{ inputs.steps }}
          SNAPSHOT_INTERVAL: ${{ inputs.snapshot_interval }}
          CANDIDATES_PER_FAMILY: ${{ inputs.candidates_per_family }}
          SELECTED_PER_FAMILY: ${{ inputs.selected_per_family }}
          MAX_REPAIR_CANDIDATES: ${{ inputs.max_repair_candidates }}
        run: |
          set -euo pipefail

          args=(
            --config "$CONFIG"
            --out-dir "$OUT_DIR"
          )

          if [ -n "$SEEDS" ]; then args+=(--seeds "$SEEDS"); fi
          if [ -n "$SEED_START" ]; then args+=(--seed-start "$SEED_START"); fi
          if [ -n "$SEED_COUNT" ]; then args+=(--seed-count "$SEED_COUNT"); fi
          if [ -n "$TOTAL_SEEDS" ]; then args+=(--total-seeds "$TOTAL_SEEDS"); fi
          if [ -n "$SHARD_INDEX" ]; then args+=(--shard-index "$SHARD_INDEX"); fi
          if [ -n "$SHARD_COUNT" ]; then args+=(--shard-count "$SHARD_COUNT"); fi
          if [ -n "$STEPS" ]; then args+=(--steps "$STEPS"); fi
          if [ -n "$SNAPSHOT_INTERVAL" ]; then args+=(--snapshot-interval "$SNAPSHOT_INTERVAL"); fi
          if [ -n "$CANDIDATES_PER_FAMILY" ]; then args+=(--candidates-per-family "$CANDIDATES_PER_FAMILY"); fi
          if [ -n "$SELECTED_PER_FAMILY" ]; then args+=(--selected-per-family "$SELECTED_PER_FAMILY"); fi
          if [ -n "$MAX_REPAIR_CANDIDATES" ]; then args+=(--max-repair-candidates "$MAX_REPAIR_CANDIDATES"); fi

          sage_args=(sage sage/62_exactlike_guided_generator_validation.sage "${args[@]}")
          sage_command="$(printf '%q ' "${sage_args[@]}")"

          # The SageMath image entrypoint runs `sage -sh -c "$*"`.
          # Pass a single quoted command string so arguments survive intact.
          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$sage_command" \
            2>&1 | tee "$OUT_DIR/runner.log"

      - name: Run Rust search engine
        if: ${{ inputs.engine == 'rust' }}
        id: rust-experiment
        env:
          CONFIG: ${{ inputs.config }}
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          SEEDS: ${{ inputs.seeds }}
          SEED_START: ${{ inputs.seed_start }}
          SEED_COUNT: ${{ inputs.seed_count }}
          TOTAL_SEEDS: ${{ inputs.total_seeds }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ inputs.shard_count }}
          STEPS: ${{ inputs.steps }}
          CANDIDATES_PER_FAMILY: ${{ inputs.candidates_per_family }}
          SELECTED_PER_FAMILY: ${{ inputs.selected_per_family }}
        run: |
          set -euo pipefail

          args=(
            --config "$CONFIG"
            --out-dir "$OUT_DIR"
          )

          if [ -n "$SEEDS" ]; then args+=(--seeds "$SEEDS"); fi
          if [ -n "$SEED_START" ]; then args+=(--seed-start "$SEED_START"); fi
          if [ -n "$SEED_COUNT" ]; then args+=(--seed-count "$SEED_COUNT"); fi
          if [ -n "$TOTAL_SEEDS" ]; then args+=(--total-seeds "$TOTAL_SEEDS"); fi
          if [ -n "$SHARD_INDEX" ]; then args+=(--shard-index "$SHARD_INDEX"); fi
          if [ -n "$SHARD_COUNT" ]; then args+=(--shard-count "$SHARD_COUNT"); fi
          if [ -n "$STEPS" ]; then args+=(--steps "$STEPS"); fi
          if [ -n "$CANDIDATES_PER_FAMILY" ]; then args+=(--candidates-per-family "$CANDIDATES_PER_FAMILY"); fi
          if [ -n "$SELECTED_PER_FAMILY" ]; then args+=(--selected-per-family "$SELECTED_PER_FAMILY"); fi

          cargo run --release --manifest-path engines/rust-search/Cargo.toml -- "${args[@]}" \
            2>&1 | tee "$OUT_DIR/runner.log"

      - name: Convert Rust score0 candidates
        if: ${{ inputs.engine == 'rust' }}
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail
          python3 scripts/rust_candidates_to_sage.py \
            --candidates "$OUT_DIR/candidates.jsonl" \
            --out-dir "$OUT_DIR/score0_candidates" \
            --summary "$OUT_DIR/score0_candidates.json" \
            2>&1 | tee -a "$OUT_DIR/runner.log"

      - name: Verify Rust score0 candidates with Sage
        if: ${{ inputs.engine == 'rust' }}
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
        run: |
          set -euo pipefail

          verify_args=(
            sage sage/64_verify_score0_candidates.sage
            --score0-summary "$OUT_DIR/score0_candidates.json"
            --engine-summary "$OUT_DIR/engine_summary.json"
            --out-dir "$OUT_DIR"
            --comparison-summary "$OUT_DIR/comparison_summary.json"
          )
          verify_command="$(printf '%q ' "${verify_args[@]}")"

          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            "$verify_command" \
            2>&1 | tee -a "$OUT_DIR/runner.log"

      - name: Build run summary
        if: always()
        env:
          OUT_DIR: ${{ steps.prepare.outputs.out_dir }}
          ENGINE: ${{ steps.prepare.outputs.engine }}
          CONFIG: ${{ inputs.config }}
          RUN_LABEL: ${{ steps.prepare.outputs.raw_label }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 scripts/actions_summary.py \
            --out-dir "$OUT_DIR" \
            --config "$CONFIG" \
            --run-label "$RUN_LABEL" \
            --run-url "$RUN_URL" \
            --status "$JOB_STATUS" \
            --engine "$ENGINE" \
            --payload "$OUT_DIR/slack_payload.json" \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: research-${{ steps.prepare.outputs.safe_label }}-${{ github.run_id }}
          path: ${{ steps.prepare.outputs.out_dir }}
          if-no-files-found: warn
          retention-days: ${{ steps.prepare.outputs.retention_days }}

  aggregate:
    name: Aggregate shard results
    if: always()
    needs:
      - define-shards
      - run
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: downloaded-artifacts

      - name: Build aggregate summary
        env:
          RUN_LABEL: ${{ inputs.run_label }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ needs.run.result }}
          SHARD_JOBS: ${{ needs.define-shards.outputs.shard_jobs }}
          FANOUT: ${{ needs.define-shards.outputs.fanout }}
        run: |
          set -euo pipefail
          python3 scripts/actions_aggregate.py \
            --artifacts-dir downloaded-artifacts \
            --run-label "$RUN_LABEL" \
            --run-url "$RUN_URL" \
            --status "$JOB_STATUS" \
            --expected-shards "$SHARD_JOBS" \
            --fanout "$FANOUT" \
            --payload aggregate_slack_payload.json \
            --summary aggregate_summary.md \
            --json-summary aggregate_summary.json \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: research-aggregate-${{ github.run_id }}
          path: |
            aggregate_summary.md
            aggregate_summary.json
            aggregate_slack_payload.json
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: aggregate_slack_payload.json
