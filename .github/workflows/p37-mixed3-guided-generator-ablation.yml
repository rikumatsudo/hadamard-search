name: p37-mixed3-guided-generator-ablation

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Short label for artifact and Slack messages"
        required: false
        default: "p37-mixed3-guided-generator-smoke"
        type: string
      preset:
        description: "Preset input bundle"
        required: false
        default: "remote-smoke"
        type: choice
        options:
          - "remote-smoke"
          - "p37-mixed3-guided-generator-40"
          - "p37-mixed3-reproducibility-40"
          - "custom"
      variants:
        description: "Comma-separated generator variants"
        required: false
        default: "random_fixed_size,pair_profile_plus_mixed3"
        type: string
      candidates_per_variant:
        description: "Candidates per variant per shard"
        required: false
        default: "1"
        type: string
      sample_count:
        description: "Point-addition sampled candidate count"
        required: false
        default: "5"
        type: string
      repair_budget:
        description: "Greedy one-swap repair budget"
        required: false
        default: "2"
        type: string
      repair_swap_sample_count:
        description: "Sampled repair swaps per repair step"
        required: false
        default: "16"
        type: string
      diagnostic_sample_count:
        description: "Sampled one-swap diagnostics per candidate"
        required: false
        default: "16"
        type: string
      triple_sample_size:
        description: "Sampled triple pairs for generation loss"
        required: false
        default: "10"
        type: string
      base_seed:
        description: "Base random seed"
        required: false
        default: "37003"
        type: string
      include_explicit_reproduce_previous:
        description: "Append one explicit reproduction of previous score0 seed/settings on shard 0"
        required: false
        default: false
        type: boolean
      shard_count:
        description: "Shard count for fan-out"
        required: false
        default: "1"
        type: string
      max_parallel:
        description: "Maximum parallel shard jobs"
        required: false
        default: "1"
        type: string
  pull_request:
    paths:
      - "analysis/p37_mixed3_guided_generator_ablation.py"
      - ".github/workflows/p37-mixed3-guided-generator-ablation.yml"
      - "configs/experiments/p37_mixed3_guided_generator_ablation.yaml"
      - "scripts/dispatch_p37_mixed3_guided_generator_ablation.py"
      - "outputs/candidates/small_p/exact_v37_djokovic_2009_g_matrices_order37.json"
      - "sage/06_known_sds_regression.sage"
      - "sage/08_analyze_sds_candidate.sage"
      - "sage/05_validate_candidate_json.sage"
      - "sage/04_build_gs_from_sds.sage"

permissions:
  contents: read
  actions: read

concurrency:
  group: p37-mixed3-guided-generator-${{ github.ref }}-${{ inputs.run_label || github.event_name }}
  cancel-in-progress: false

env:
  SAGE_DOCKER_IMAGE: sagemath/sagemath:10.8
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  known-regression:
    name: Known SDS regression
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run known SDS regression
        run: |
          set -euo pipefail
          docker run --rm \
            --user root \
            -v "$PWD":/work \
            -w /work \
            -e DOT_SAGE=/tmp/sage-dot \
            "$SAGE_DOCKER_IMAGE" \
            sage sage/06_known_sds_regression.sage

  define-shards:
    name: Define shard matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
      effective_variants: ${{ steps.matrix.outputs.effective_variants }}
      effective_candidates_per_variant: ${{ steps.matrix.outputs.effective_candidates_per_variant }}
      effective_sample_count: ${{ steps.matrix.outputs.effective_sample_count }}
      effective_repair_budget: ${{ steps.matrix.outputs.effective_repair_budget }}
      effective_repair_swap_sample_count: ${{ steps.matrix.outputs.effective_repair_swap_sample_count }}
      effective_diagnostic_sample_count: ${{ steps.matrix.outputs.effective_diagnostic_sample_count }}
      effective_triple_sample_size: ${{ steps.matrix.outputs.effective_triple_sample_size }}
      effective_base_seed: ${{ steps.matrix.outputs.effective_base_seed }}
      effective_include_explicit_reproduce_previous: ${{ steps.matrix.outputs.effective_include_explicit_reproduce_previous }}
      effective_output_root: ${{ steps.matrix.outputs.effective_output_root }}
      effective_experiment_name: ${{ steps.matrix.outputs.effective_experiment_name }}
    steps:
      - name: Build matrix
        id: matrix
        env:
          PRESET: ${{ inputs.preset || 'remote-smoke' }}
          VARIANTS: ${{ inputs.variants || 'random_fixed_size,pair_profile_plus_mixed3' }}
          CANDIDATES_PER_VARIANT: ${{ inputs.candidates_per_variant || '1' }}
          SAMPLE_COUNT: ${{ inputs.sample_count || '5' }}
          REPAIR_BUDGET: ${{ inputs.repair_budget || '2' }}
          REPAIR_SWAP_SAMPLE_COUNT: ${{ inputs.repair_swap_sample_count || '16' }}
          DIAGNOSTIC_SAMPLE_COUNT: ${{ inputs.diagnostic_sample_count || '16' }}
          TRIPLE_SAMPLE_SIZE: ${{ inputs.triple_sample_size || '10' }}
          BASE_SEED: ${{ inputs.base_seed || '37003' }}
          INCLUDE_EXPLICIT_REPRODUCE_PREVIOUS: ${{ inputs.include_explicit_reproduce_previous || false }}
          SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          MAX_PARALLEL: ${{ inputs.max_parallel || '1' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          preset = os.environ.get("PRESET") or "remote-smoke"
          if preset == "p37-mixed3-guided-generator-40":
              shard_count = 40
              max_parallel = 40
              variants = "random_fixed_size,pair_profile_guided,pair_profile_plus_AP_E,pair_profile_plus_mixed3,pair_profile_plus_mixed3_plus_AP_E,pair_profile_plus_mixed3_plus_sampled_triple"
              candidates_per_variant = "200"
              sample_count = "12"
              repair_budget = "20"
              repair_swap_sample_count = "128"
              diagnostic_sample_count = "128"
              triple_sample_size = "100"
              base_seed = "37003"
              include_explicit_reproduce_previous = "false"
              output_root = "outputs/p37_mixed3_guided_generator_ablation"
              experiment_name = "p37_mixed3_guided_generator_ablation"
          elif preset == "p37-mixed3-reproducibility-40":
              shard_count = 40
              max_parallel = 40
              variants = "random_fixed_size,pair_profile_guided,pair_profile_plus_AP_E,pair_profile_plus_mixed3,pair_profile_plus_mixed3_focus,pair_profile_plus_mixed3_plus_AP_E,pair_profile_plus_mixed3_plus_sampled_triple"
              candidates_per_variant = "500"
              sample_count = "12"
              repair_budget = "24"
              repair_swap_sample_count = "128"
              diagnostic_sample_count = "128"
              triple_sample_size = "100"
              base_seed = "91037"
              include_explicit_reproduce_previous = "true"
              output_root = "outputs/p37_mixed3_reproducibility"
              experiment_name = "p37_mixed3_reproducibility"
          else:
              shard_count = int(os.environ.get("SHARD_COUNT") or "1")
              max_parallel = int(os.environ.get("MAX_PARALLEL") or "1")
              variants = os.environ.get("VARIANTS") or "random_fixed_size,pair_profile_plus_mixed3"
              candidates_per_variant = os.environ.get("CANDIDATES_PER_VARIANT") or "1"
              sample_count = os.environ.get("SAMPLE_COUNT") or "5"
              repair_budget = os.environ.get("REPAIR_BUDGET") or "2"
              repair_swap_sample_count = os.environ.get("REPAIR_SWAP_SAMPLE_COUNT") or "16"
              diagnostic_sample_count = os.environ.get("DIAGNOSTIC_SAMPLE_COUNT") or "16"
              triple_sample_size = os.environ.get("TRIPLE_SAMPLE_SIZE") or "10"
              base_seed = os.environ.get("BASE_SEED") or "37003"
              include_explicit_reproduce_previous = str(os.environ.get("INCLUDE_EXPLICIT_REPRODUCE_PREVIOUS") or "false").lower()
              output_root = "outputs/p37_mixed3_guided_generator_ablation"
              experiment_name = "p37_mixed3_guided_generator_ablation"
          if shard_count < 1:
              raise SystemExit("shard_count must be >= 1")
          if max_parallel < 1:
              raise SystemExit("max_parallel must be >= 1")
          max_parallel = min(max_parallel, shard_count)
          width = max(2, len(str(shard_count - 1)))
          matrix = [
              {
                  "shard_index": idx,
                  "shard_suffix": "single" if shard_count == 1 else f"s{idx:0{width}d}",
                  "shard_count": shard_count,
              }
              for idx in range(shard_count)
          ]
          print("matrix={}".format(json.dumps({"include": matrix}, separators=(",", ":"))))
          print("max_parallel={}".format(max_parallel))
          print("effective_variants={}".format(variants))
          print("effective_candidates_per_variant={}".format(candidates_per_variant))
          print("effective_sample_count={}".format(sample_count))
          print("effective_repair_budget={}".format(repair_budget))
          print("effective_repair_swap_sample_count={}".format(repair_swap_sample_count))
          print("effective_diagnostic_sample_count={}".format(diagnostic_sample_count))
          print("effective_triple_sample_size={}".format(triple_sample_size))
          print("effective_base_seed={}".format(base_seed))
          print("effective_include_explicit_reproduce_previous={}".format(include_explicit_reproduce_previous))
          print("effective_output_root={}".format(output_root))
          print("effective_experiment_name={}".format(experiment_name))
          PY

  run-shard:
    name: Generator shard ${{ matrix.shard_suffix }}
    needs:
      - known-regression
      - define-shards
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.define-shards.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.define-shards.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run p37 mixed3-guided generator shard
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p37-mixed3-guided-generator-smoke' }}
          VARIANTS: ${{ needs.define-shards.outputs.effective_variants }}
          CANDIDATES_PER_VARIANT: ${{ needs.define-shards.outputs.effective_candidates_per_variant }}
          SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_sample_count }}
          REPAIR_BUDGET: ${{ needs.define-shards.outputs.effective_repair_budget }}
          REPAIR_SWAP_SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_repair_swap_sample_count }}
          DIAGNOSTIC_SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_diagnostic_sample_count }}
          TRIPLE_SAMPLE_SIZE: ${{ needs.define-shards.outputs.effective_triple_sample_size }}
          BASE_SEED: ${{ needs.define-shards.outputs.effective_base_seed }}
          INCLUDE_EXPLICIT_REPRODUCE_PREVIOUS: ${{ needs.define-shards.outputs.effective_include_explicit_reproduce_previous }}
          OUTPUT_ROOT: ${{ needs.define-shards.outputs.effective_output_root }}
          EXPERIMENT_NAME: ${{ needs.define-shards.outputs.effective_experiment_name }}
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_COUNT: ${{ matrix.shard_count }}
          SHARD_SUFFIX: ${{ matrix.shard_suffix }}
        run: |
          set -euo pipefail
          safe_label="$(printf '%s' "$RUN_LABEL" | tr -c 'A-Za-z0-9_.-' '-')"
          out_dir="${OUTPUT_ROOT}/${safe_label}-${GITHUB_RUN_ID}-${SHARD_SUFFIX}"
          python3 analysis/p37_mixed3_guided_generator_ablation.py \
            --out-dir "$out_dir" \
            --output-root "$OUTPUT_ROOT" \
            --experiment-name "$EXPERIMENT_NAME" \
            --run-id "${safe_label}-${GITHUB_RUN_ID}" \
            --variants "$VARIANTS" \
            --candidates-per-variant "$CANDIDATES_PER_VARIANT" \
            --sample-count "$SAMPLE_COUNT" \
            --repair-budget "$REPAIR_BUDGET" \
            --repair-swap-sample-count "$REPAIR_SWAP_SAMPLE_COUNT" \
            --diagnostic-sample-count "$DIAGNOSTIC_SAMPLE_COUNT" \
            --triple-sample-size "$TRIPLE_SAMPLE_SIZE" \
            --base-seed "$BASE_SEED" \
            --shard-id "$SHARD_INDEX" \
            --shard-count "$SHARD_COUNT" \
            $([ "$INCLUDE_EXPLICIT_REPRODUCE_PREVIOUS" = "true" ] && printf '%s' "--include-explicit-reproduce-previous" || true)

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: p37-mixed3-guided-generator-${{ matrix.shard_suffix }}-${{ github.run_id }}
          path: ${{ needs.define-shards.outputs.effective_output_root }}/*-${{ github.run_id }}-${{ matrix.shard_suffix }}
          if-no-files-found: error
          retention-days: 14

  aggregate:
    name: Aggregate p37 mixed3-guided generator
    needs:
      - define-shards
      - run-shard
    runs-on: ubuntu-24.04
    if: always() && needs.run-shard.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shard artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded-artifacts
          pattern: p37-mixed3-guided-generator-*-${{ github.run_id }}
          merge-multiple: false

      - name: Aggregate shard outputs
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p37-mixed3-guided-generator-smoke' }}
          VARIANTS: ${{ needs.define-shards.outputs.effective_variants }}
          CANDIDATES_PER_VARIANT: ${{ needs.define-shards.outputs.effective_candidates_per_variant }}
          SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_sample_count }}
          REPAIR_BUDGET: ${{ needs.define-shards.outputs.effective_repair_budget }}
          REPAIR_SWAP_SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_repair_swap_sample_count }}
          DIAGNOSTIC_SAMPLE_COUNT: ${{ needs.define-shards.outputs.effective_diagnostic_sample_count }}
          TRIPLE_SAMPLE_SIZE: ${{ needs.define-shards.outputs.effective_triple_sample_size }}
          BASE_SEED: ${{ needs.define-shards.outputs.effective_base_seed }}
          OUTPUT_ROOT: ${{ needs.define-shards.outputs.effective_output_root }}
          EXPERIMENT_NAME: ${{ needs.define-shards.outputs.effective_experiment_name }}
        run: |
          set -euo pipefail
          safe_label="$(printf '%s' "$RUN_LABEL" | tr -c 'A-Za-z0-9_.-' '-')"
          out_dir="${OUTPUT_ROOT}/${safe_label}-${GITHUB_RUN_ID}-aggregate"
          python3 analysis/p37_mixed3_guided_generator_ablation.py \
            --aggregate \
            --aggregate-roots downloaded-artifacts \
            --out-dir "$out_dir" \
            --output-root "$OUTPUT_ROOT" \
            --experiment-name "$EXPERIMENT_NAME" \
            --run-id "${safe_label}-${GITHUB_RUN_ID}" \
            --variants "$VARIANTS" \
            --candidates-per-variant "$CANDIDATES_PER_VARIANT" \
            --sample-count "$SAMPLE_COUNT" \
            --repair-budget "$REPAIR_BUDGET" \
            --repair-swap-sample-count "$REPAIR_SWAP_SAMPLE_COUNT" \
            --diagnostic-sample-count "$DIAGNOSTIC_SAMPLE_COUNT" \
            --triple-sample-size "$TRIPLE_SAMPLE_SIZE" \
            --base-seed "$BASE_SEED"

      - name: Validate score0 candidates if present
        run: |
          set -euo pipefail
          score_dir="$(find outputs -path '*/score0_candidate_jsons' -type d | head -n 1 || true)"
          if [ -z "$score_dir" ] || ! find "$score_dir" -name '*.json' -type f | grep -q .; then
            echo "No score0 candidates to validate."
            exit 0
          fi
          while IFS= read -r candidate; do
            echo "Validating score0 candidate: $candidate"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" sage sage/08_analyze_sds_candidate.sage "$candidate"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" sage sage/05_validate_candidate_json.sage "$candidate"
            docker run --rm --user root -v "$PWD":/work -w /work -e DOT_SAGE=/tmp/sage-dot "$SAGE_DOCKER_IMAGE" sage sage/04_build_gs_from_sds.sage "$candidate"
          done < <(find "$score_dir" -name '*.json' -type f | sort)
          report="$(dirname "$score_dir")/validation_report.json"
          cp "$(dirname "$score_dir")/score0_candidates.jsonl" "$(dirname "$score_dir")/validated_score0_candidates.jsonl"
          python3 - "$report" <<'PY'
          import json
          import sys
          path = sys.argv[1]
          with open(path) as f:
              data = json.load(f)
          data["sage_validation_status"] = "passed"
          data["validated_score0_count"] = data.get("score0_candidate_count", 0)
          data["sage_validation_note"] = "08_analyze, 05_validate, and 04_build_gs_from_sds completed for every score0 JSON."
          with open(path, "w") as f:
              json.dump(data, f, indent=2, sort_keys=True)
              f.write("\n")
          PY

      - name: Upload aggregate artifact
        uses: actions/upload-artifact@v4
        with:
          name: p37-mixed3-guided-generator-ablation-${{ github.run_id }}
          path: outputs/*/*-${{ github.run_id }}-aggregate
          if-no-files-found: error
          retention-days: 30

      - name: Slack notify
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_LABEL: ${{ inputs.run_label || 'p37-mixed3-guided-generator-smoke' }}
          STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json
          import os
          text = "p37 mixed3-guided generator ablation {status}: {label} run {run_id}".format(
              status=os.environ.get("STATUS"),
              label=os.environ.get("RUN_LABEL"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
          )
          print(json.dumps({"text": text}))
          PY
          )
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" >/dev/null
